<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Image Gallery</title>

    <style>
      /* ===== GENERAL ===== */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f3f4f6;
        padding: 20px;
        text-align: center;
      }

      h1 {
        margin-bottom: 25px;
        color: #333;
      }

      /* ===== FILTER BUTTONS ===== */

      .filters {
        margin-bottom: 25px;
      }

      .filters button {
        padding: 10px 18px;
        margin: 5px;
        border: none;
        background: #333;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
      }

      .filters button:hover {
        background: #ff5252;
      }

      /* ===== GALLERY GRID ===== */

      .gallery {
        max-width: 1200px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 15px;
      }

      /* ===== IMAGE STYLE ===== */

      .gallery img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .gallery img:hover {
        transform: scale(1.06);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      /* ===== LIGHTBOX ===== */

      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .lightbox img {
        max-width: 85%;
        max-height: 85%;
        border-radius: 10px;
      }

      /* CLOSE BUTTON */

      .close {
        position: absolute;
        top: 20px;
        right: 35px;
        font-size: 35px;
        color: white;
        cursor: pointer;
      }

      /* NAVIGATION */

      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 45px;
        color: white;
        cursor: pointer;
        user-select: none;
        padding: 10px;
      }

      .prev {
        left: 30px;
      }

      .next {
        right: 30px;
      }

      /* ===== MOBILE ===== */

      @media (max-width: 600px) {
        .gallery img {
          height: 150px;
        }

        .nav {
          font-size: 35px;
        }
      }
    </style>
  </head>

  <body>
    <h1>Responsive Image Gallery</h1>

    <!-- FILTER BUTTONS -->

    <div class="filters">
      <button onclick="filterGallery('all')">All</button>
      <button onclick="filterGallery('nature')">Nature</button>
      <button onclick="filterGallery('city')">City</button>
      <button onclick="filterGallery('animals')">Animals</button>
    </div>

    <!-- GALLERY -->

    <div class="gallery" id="gallery">
      <img src="https://picsum.photos/id/1015/400/300" class="nature" />
      <img src="https://picsum.photos/id/1016/400/300" class="nature" />
      <img src="https://picsum.photos/id/1050/400/300" class="city" />
      <img src="https://picsum.photos/id/1012/400/300" class="city" />
      <img src="https://picsum.photos/id/1025/400/300" class="animals" />
      <img src="https://picsum.photos/id/1024/400/300" class="animals" />
      <img src="https://picsum.photos/id/1035/400/300" class="nature" />
      <img src="https://picsum.photos/id/1043/400/300" class="city" />
    </div>

    <!-- LIGHTBOX -->

    <div class="lightbox" id="lightbox">
      <span class="close" onclick="closeLightbox()">×</span>

      <span class="nav prev" onclick="changeImage(-1)">❮</span>

      <img id="lightboxImg" />

      <span class="nav next" onclick="changeImage(1)">❯</span>
    </div>

    <script>
      /* ===== SELECT ELEMENTS ===== */

      const images = document.querySelectorAll(".gallery img");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightboxImg");

      let currentIndex = 0;

      /* ===== OPEN LIGHTBOX ===== */

      images.forEach((img, index) => {
        img.addEventListener("click", () => {
          lightbox.style.display = "flex";
          lightboxImg.src = img.src;
          currentIndex = index;
        });
      });

      /* ===== CLOSE LIGHTBOX ===== */

      function closeLightbox() {
        lightbox.style.display = "none";
      }

      /* ===== NEXT / PREVIOUS ===== */

      function changeImage(step) {
        currentIndex += step;

        if (currentIndex < 0) {
          currentIndex = images.length - 1;
        }

        if (currentIndex >= images.length) {
          currentIndex = 0;
        }

        lightboxImg.src = images[currentIndex].src;
      }

      /* ===== KEYBOARD NAVIGATION ===== */

      document.addEventListener("keydown", (e) => {
        if (lightbox.style.display === "flex") {
          if (e.key === "ArrowRight") changeImage(1);
          if (e.key === "ArrowLeft") changeImage(-1);
          if (e.key === "Escape") closeLightbox();
        }
      });

      /* ===== FILTER FUNCTION ===== */

      function filterGallery(category) {
        images.forEach((img) => {
          if (category === "all") {
            img.style.display = "block";
          } else if (img.classList.contains(category)) {
            img.style.display = "block";
          } else {
            img.style.display = "none";
          }
        });
      }

      /* ===== CLOSE WHEN BACKGROUND CLICKED ===== */

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          closeLightbox();
        }
      });
    </script>
  </body>
</html>
